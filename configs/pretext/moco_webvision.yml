# Setup
setup: moco # MoCo-v2 self-supervised pretraining
dataset: webvision

# Model
backbone: InceptionResNetV2
model_kwargs:
   head: mlp
   features_dim: 128

# Dataset
data_path: '../../data/data_webvision/'
train_db_name: webvision
val_db_name: webvision
num_classes: 50
to_noisy_dataset: False  # labels are not used in MoCo pretraining

# MoCo specific parameters (following the paper)
temperature: 0.07
queue_size: 65536  # Size of the negative queue
moco_momentum: 0.999  # Momentum for updating key encoder

# Training parameters (4-GPU setup, total batch=128)
epochs: 100
warmup_epochs: 1
batch_size: 32  # Per GPU batch size (32*4=128 total)
num_workers: 8

# Optimizer (following paper: SGD, lr=0.015, momentum=0.9, weight_decay=0.0001)
optimizer: sgd
optimizer_kwargs:
   lr: 0.015
   momentum: 0.9
   weight_decay: 0.0001

# Scheduler
scheduler: cosine

# Transformations for MoCo-v2 (following the paper)
augmentation_strategy: moco  # MoCo-v2 uses similar augmentations as SimCLR

augmentation_kwargs:
   random_resized_crop:
      size: 224
      scale: [0.2, 1.0]
   color_jitter_random_apply:
      p: 0.8
   color_jitter:
      brightness: 0.4
      contrast: 0.4
      saturation: 0.4
      hue: 0.1
   random_grayscale:
      p: 0.2
   normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]
   crop_size: 224
