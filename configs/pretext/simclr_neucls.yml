# Setup
setup: simclr
dataset: neucls
data_path: F:/dataset-industry/NEU-CLS

# Model
backbone: resnet18
model_kwargs:
   head: mlp
   features_dim: 128  

# Dataset
train_db_name: neucls
val_db_name: neucls
num_classes: 6  # NEU-CLS有6个类别

# Loss
criterion: simclr
criterion_kwargs:
   temperature: 0.1 

# Hyperparameters
epochs: 500  # 小数据集可以训练更多轮
optimizer: sgd
optimizer_kwargs:
   nesterov: False
   weight_decay: 0.0001 
   momentum: 0.9
   lr: 0.1  # 小数据集降低学习率
scheduler: cosine
scheduler_kwargs:
   lr_decay_rate: 0.1
batch_size: 64  # NEU-CLS数据量小，使用较小batch_size
num_workers: 4
to_noisy_dataset: False # labels are not used

# Transformations
augmentation_strategy: simclr 
augmentation_kwargs:
   random_resized_crop:
      size: 200  # NEU-CLS图片是200x200
      scale: [0.2, 1.0]
   color_jitter_random_apply:
      p: 0.8
   color_jitter:
      brightness: 0.4
      contrast: 0.4
      saturation: 0.4
      hue: 0.1
   random_grayscale: 
      p: 0.2
   normalize:
      mean: [0.485, 0.456, 0.406]  # ImageNet标准化参数
      std: [0.229, 0.224, 0.225]
   crop_size: 200
